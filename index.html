<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Entrepreneurship Education Chatbot</title>

    <style>
      /* UL Brand Greens */
      :root {
          --ul-green: #005335;
          --ul-modern-green: #00B140;
          --ul-heritage-green: #003726;
          --light-gray: #F2F2F1;
          --bg: #fafafa;
      }
  
      body, html {
          margin: 0;
          padding: 0;
          width: 100%;
          height: 100%;
          font-family: "Segoe UI", Arial, sans-serif;
          background: var(--bg);
      }
      * { box-sizing: border-box; }
  
      header {
          width: 100%;
          padding: 20px;
          background: var(--ul-green);
          color: #fff;
          text-align: center;
          font-size: 26px;
          font-weight: bold;
          box-shadow: 0px 4px 6px rgba(0,0,0,0.15);
      }
  
      #chat-container {
          display: flex;
          flex-direction: column;
          margin: 0 auto;
          width: 100%;
          max-width: 700px;
          height: calc(100vh - 80px); /* leave room for header */
          background: #fff;
          border-radius: 12px 12px 0 0;
          box-shadow: 0 4px 15px rgba(0,0,0,0.1);
          overflow: hidden;
      }
  
      #messages {
          flex: 1;
          padding: 12px;
          overflow-y: auto;
          background: var(--light-gray);
          word-wrap: break-word;
      }
  
      .message {
          max-width: 75%;
          margin: 6px 0;
          padding: 12px 16px;
          border-radius: 18px;
          font-size: 16px;
          line-height: 1.5;
          position: relative;
          animation: fadeIn 0.3s ease;
          word-wrap: break-word;
      }
  
      .user { background: var(--ul-modern-green); color: #fff; margin-left: auto; border-bottom-right-radius: 4px; }
      .bot { background: var(--ul-heritage-green); color: #fff; border-bottom-left-radius: 4px; }
  
      .timestamp { font-size: 10px; opacity: 0.6; position: absolute; bottom: -14px; }
      .user .timestamp { right: 8px; color: #000; }
      .bot .timestamp { left: 8px; color: #000; }
  
      #input-area {
          display: flex;
          padding: 10px;
          background: white;
          border-top: 2px solid var(--light-gray);
          /* Move up slightly on mobile */
      }
      #user-input { flex: 1; padding: 14px 16px; font-size: 18px; border: 1px solid #ccc; border-radius: 22px; outline: none; transition: 0.2s all ease; }
      #user-input:focus { border-color: var(--ul-green); box-shadow: 0 0 4px rgba(0,83,53,0.3); }
      #send-btn { margin-left: 8px; padding: 14px 18px; background: var(--ul-modern-green); border: none; border-radius: 22px; font-size: 18px; font-weight: bold; color: #fff; cursor: pointer; transition: 0.2s ease; }
      #send-btn:hover { background: #009936; }
  
      @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  
      /* Responsive for mobile */
      @media (max-width: 480px) {
          header { font-size: 24px; padding: 15px; }
          #chat-container {
              height: 100vh;
              width: 100%;
              margin: 0;
              border-radius: 0;
          }
          #messages { padding: 10px; }
          .message { font-size: 18px; padding: 14px 16px; max-width: 85%; }
          #input-area { padding: 8px; margin-bottom: 5px; }
          #user-input { font-size: 20px; padding: 12px 14px; }
          #send-btn { font-size: 20px; padding: 12px 16px; }
      }
  </style>
</head>

<body>

<header>Entrepreneurship Chatbot</header>

<div id="chat-container">
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Ask something about entrepreneurship..." autofocus />
        <button id="send-btn">SEND</button>
    </div>
</div>

<script>
    const input = document.getElementById("user-input");
    const button = document.getElementById("send-btn");
    const messages = document.getElementById("messages");

    function addMessage(text, cls) {
        const msg = document.createElement("div");
        msg.classList.add("message", cls);
        msg.textContent = text;

        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const stamp = document.createElement("div");
        stamp.classList.add("timestamp");
        stamp.textContent = time;
        msg.appendChild(stamp);

        messages.appendChild(msg);
        messages.scrollTop = messages.scrollHeight;
    }

    async function sendMessage() {
        const message = input.value.trim();
        if (!message) return;

        addMessage(message, "user");
        input.value = "";
        input.focus();

        try {
            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message })
            });
            const data = await response.json();
            addMessage(data.reply || "No response.", "bot");
        } catch (err) {
            addMessage("Error: " + err.message, "bot");
        }
    }

    button.addEventListener("click", sendMessage);
    input.addEventListener("keypress", e => { if (e.key === "Enter") sendMessage(); });

    window.onload = () => {
        const welcomeText = "Hello! I'm VentureMate. I'm here to help you with Entrepreneurship Education. Ask me anything!";
        addMessage(welcomeText, "bot");
    };
</script>

</body>
</html>
